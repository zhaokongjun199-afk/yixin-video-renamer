<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>艺秋 · 视频批量命名</title>
  <style>
    :root{--pink:#ff4f9b;--line:#ffc1dc;--wash:#fff2f8;--ink:#4b3440;--muted:#a36d83}
    *{box-sizing:border-box} body{margin:0;background:var(--wash);color:var(--ink);font:14px "Microsoft YaHei",Arial,sans-serif}
    .app{min-height:100vh;padding:18px 20px 28px}.header,.panel{background:#fff;border:1px solid var(--line)}
    .header{height:88px;padding:18px;display:flex;align-items:center;justify-content:space-between}.brand h1{margin:0;color:#ff1683;font-size:22px}.brand p{margin:5px 0 0;color:var(--muted);font-size:12px}.badge{border:1px solid #ff9ec5;color:#ff1683;padding:8px 24px}
    .panel{margin-top:16px;padding:14px}.drop{min-height:132px;border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:.18s}.drop.drag{background:#fff8fc;border-color:var(--pink)}.drop strong{color:#ff1683;font-size:16px}.drop span{color:var(--muted);font-size:12px}
    .tools{display:flex;gap:8px;align-items:center;margin-top:8px;width:100%;max-width:720px}.tools input{flex:1}.fields{display:grid;grid-template-columns:120px minmax(180px,1fr) 146px 102px 90px;gap:8px;align-items:center}.fields h2{grid-column:1/-1;margin:0 0 4px;color:#ff1683;font-size:15px}.field-label{color:#c23c72;font-weight:bold}.extra{display:flex;gap:12px;grid-column:2/-1;margin-top:8px}.extra label{display:flex;flex-direction:column;gap:5px;color:#c23c72;font-weight:bold;font-size:12px}
    input,select,button{height:34px;border:1px solid #f3b5ce;background:#fff;color:var(--ink);font:inherit;padding:0 9px} select{min-width:0}button{cursor:pointer;color:#ca3775;background:#fff7fb;font-weight:bold}button:hover{background:#ffe7f1}.primary{background:#ff5aa0;color:#fff;border-color:#ff5aa0}.primary:hover{background:#ed3e8b}
    .table-wrap{padding:0;overflow:auto;min-height:220px}table{width:100%;border-collapse:collapse;table-layout:fixed}th,td{padding:10px 12px;border-bottom:1px solid #ffe0ec;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}th{background:#fff0f6;color:#b63d70}td:last-child{width:110px}.ok{color:#208655;font-weight:bold}.warn{color:#bd7500;font-weight:bold}.footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px}.notice{color:var(--muted);font-size:12px}
    @media(max-width:800px){.app{padding:12px}.header{height:auto}.badge{display:none}.fields{grid-template-columns:1fr 1fr}.fields h2{grid-column:1/-1}.field-label{grid-column:1}.fields input{grid-column:2}.fields select,.fields button{grid-column:2}.extra{grid-column:1/-1;flex-wrap:wrap}.tools{flex-wrap:wrap}.tools input{flex-basis:100%}.footer{align-items:flex-start;gap:10px;flex-direction:column}}
    /* 手帐小狗主题 */
    :root{--pink:#f29aa4;--line:#30333a;--wash:#fdf7eb;--ink:#292c33;--muted:#6e7680;--blue:#b9dcf1;--yellow:#ffe78d;--mint:#cce9d5}
    body{background:radial-gradient(#f6dfe1 1.5px,transparent 1.5px) 0 0/18px 18px,var(--wash);font-family:"Microsoft YaHei",Arial,sans-serif}.app{max-width:1440px;margin:auto;padding:22px 26px 38px}.header,.panel{border:3px solid var(--line);border-radius:24px;box-shadow:5px 6px 0 rgba(48,51,58,.92)}
    .header{height:108px;background:var(--blue);padding:13px 24px;position:relative;overflow:hidden}.header:after{content:"✦  ♫  ✦";position:absolute;right:215px;top:16px;font-size:25px;color:#fff5b5;letter-spacing:8px;transform:rotate(-8deg)}.brand{margin-left:96px}.brand h1{font-size:24px;color:var(--ink);letter-spacing:1px;text-shadow:1px 1px #fff}.brand h1:before{content:"帕恰狗的 ";font-size:14px;vertical-align:middle}.brand p{color:#435e72;font-weight:bold}.badge{border:0;border-radius:0;background:transparent;color:#3f3540;padding:2px 8px 8px;font-family:"STKaiti","KaiTi","FangSong",serif;font-size:30px;font-weight:bold;letter-spacing:8px;line-height:1;box-shadow:none;z-index:1;position:relative;text-shadow:1px 1px 0 #fff}.badge:before{content:"✦";position:absolute;left:-7px;top:-7px;color:#e78e9b;font:15px Arial;letter-spacing:0}.badge:after{content:"";position:absolute;left:4px;right:2px;bottom:0;height:2px;background:linear-gradient(90deg,#edb86d,#f8edf0,#edb86d);transform:rotate(-2deg)}
    .mascot{position:absolute;left:22px;top:19px;width:62px;height:62px;background:#fffdf5;border:3px solid var(--line);border-radius:49% 49% 45% 45%;z-index:2}.mascot:before,.mascot:after{content:"";position:absolute;top:-17px;width:21px;height:38px;background:#25292f;border:3px solid var(--line);z-index:-1}.mascot:before{left:-8px;border-radius:20px 8px 22px 12px;transform:rotate(-29deg)}.mascot:after{right:-8px;border-radius:8px 20px 12px 22px;transform:rotate(29deg)}.mascot i{position:absolute;left:17px;top:30px;width:7px;height:7px;border-radius:50%;background:#25292f;box-shadow:22px 0 #25292f}.mascot b{position:absolute;left:27px;top:42px;width:8px;height:5px;border-radius:0 0 9px 9px;border-bottom:2px solid #25292f}.mascot em{position:absolute;left:7px;top:38px;width:11px;height:7px;border-radius:50%;background:#f8b6b8;box-shadow:36px 0 #f8b6b8}
    .panel{background:#fffdf8;margin-top:19px;padding:16px}.drop{background:var(--yellow);min-height:148px;border-style:dashed;box-shadow:4px 5px 0 var(--line)}.drop strong{color:var(--ink);font-size:18px}.drop strong:before{content:"🎬  ";}.drop span{color:#555d67;font-weight:bold}.tools input{border:2px solid var(--line);border-radius:13px;background:#fffdf8}.tools button,button{border:2px solid var(--line);border-radius:13px;background:#fffdf8;color:var(--ink);box-shadow:2px 3px 0 var(--line);font-weight:bold;transition:transform .12s,box-shadow .12s}button:before{content:"🐾 ";font-size:12px}button:hover{background:#fff7c9;transform:translate(2px,2px);box-shadow:0 1px 0 var(--line)}
    .fields{display:block;background:var(--mint)}.fields h2{color:var(--ink);font-size:17px;margin:0 0 10px}.fields h2:before{content:"✦ ";color:#ef8e98}.fields h2 small{font-size:12px;color:#597168;font-weight:normal}.format-board{display:flex;align-items:center;gap:10px;margin:0 0 13px;padding:9px 12px;background:#fff9e8;border:2px dashed #30333a;border-radius:13px}.format-label{font-weight:bold;color:#c6536d;white-space:nowrap}.format-chips{display:flex;align-items:center;gap:6px;flex-wrap:wrap}.format-chip{padding:4px 9px;background:#fff;border:2px solid #30333a;border-radius:10px;font-size:12px;font-weight:bold;box-shadow:1px 2px 0 #30333a}.format-chip.end{background:#f9c3c8}.format-join{font-weight:bold;color:#e77f9e}.rules-list{display:grid;gap:8px}.field-row[draggable="true"]{cursor:grab}.field-row.dragging{opacity:.45}.field-row.drop-before{transform:translateY(-4px);border-top:3px solid #f29aa4}.header-stickers{position:absolute;right:220px;bottom:11px;display:flex;gap:10px;align-items:end;z-index:2}.dog-ear{display:block;width:19px;height:31px;background:#25292f;border:2px solid #30333a;border-radius:16px 7px 16px 8px;transform:rotate(-24deg)}.dog-ear.right{transform:rotate(24deg)}.kitty-mark{width:31px;height:24px;background:#fffdf5;border:2px solid #30333a;border-radius:50% 50% 45% 45%;position:relative}.kitty-mark:before,.kitty-mark:after{content:"";position:absolute;top:-7px;width:9px;height:10px;background:#fffdf5;border:2px solid #30333a;transform:rotate(35deg)}.kitty-mark:before{left:1px}.kitty-mark:after{right:1px;transform:rotate(-35deg)}.kitty-mark i{position:absolute;width:4px;height:4px;border-radius:50%;background:#30333a;left:7px;top:10px;box-shadow:12px 0 #30333a}.bow-mark{width:21px;height:14px;background:#f29aa4;border:2px solid #30333a;border-radius:9px;position:relative}.bow-mark:before{content:"";position:absolute;width:8px;height:8px;border-radius:50%;background:#f9c3c8;border:2px solid #30333a;left:4px;top:1px}.heart-mark{color:#f29aa4;font-size:25px;line-height:1;text-shadow:1px 1px #30333a}.field-row{display:grid;grid-template-columns:120px minmax(180px,1fr) 146px 102px 30px;gap:8px;align-items:center}.drag-handle{height:34px;width:28px;display:block;position:relative;border:1.5px solid #30333a;border-radius:9px;background:#fff1a8;box-shadow:1px 2px 0 #30333a;cursor:grab;user-select:none;font-size:0;transition:transform .12s,background .12s}.drag-handle:before{content:"";position:absolute;left:7px;top:6px;width:14px;height:17px;background:radial-gradient(circle,#4a3b42 0 2px,transparent 2.4px) 0 0/7px 7px}.drag-handle:after{content:"";position:absolute;left:9px;bottom:4px;width:9px;height:3px;border-radius:4px;background:#f29aa4}.drag-handle:hover{background:#ffe078;transform:translateY(-1px)}.drag-handle:active{cursor:grabbing;transform:translate(1px,1px);box-shadow:0 1px 0 #30333a}.field-label{color:var(--ink)}input,select{height:36px;border:2px solid var(--line);border-radius:11px;background:#fffdf8;color:var(--ink)}.fields .add{background:#f9c3c8}.order-controls{display:flex;gap:5px}.order-controls button{width:35px;padding:0;font-size:17px;background:#b9dcf1}.order-controls button:before{content:""}.extra{margin:13px 0 0 128px}.extra label{color:var(--ink)}.extra input{min-width:120px}.table-wrap{background:#fffdf8}.table-wrap:before{content:"🐶  改名预览  ·  先看看小狗准备好的新名字吧";display:block;padding:7px 12px 12px;color:var(--ink);font-weight:bold}.table-wrap table{border:2px solid var(--line);border-radius:13px;overflow:hidden}th{background:#b9dcf1;color:var(--ink);border-bottom:2px solid var(--line)}th,td{padding:12px;border-bottom:1px dashed #a9b0b3}.ok{color:#21835c}.warn{color:#c8535e}.footer{margin-top:20px;padding:8px 4px}.footer strong{color:var(--ink);font-size:15px}.primary{background:#f29aa4;color:var(--ink);border-color:var(--line)}.primary:hover{background:#f6aeb6}.notice{color:#5c6570}.drop.drag{background:#ffd66e;transform:rotate(-.3deg)}
  </style>
</head>
<body>
<main class="app">
  <header class="header"><div class="mascot"><i></i><b></b><em></em></div><div class="header-stickers" aria-hidden="true"><span class="dog-ear"></span><span class="dog-ear right"></span><span class="kitty-mark"><i></i></span><span class="bow-mark"></span><span class="heart-mark">♥</span></div><div class="brand"><h1>视频批量命名小助手</h1><p>小狗帮你把素材排得整整齐齐 ✦ 批量预览 · 安全重命名</p></div><span class="badge">艺秋</span></header>
  <section class="panel drop" id="dropZone"><strong>上传视频文件</strong><span>仅支持 MP4、MOV、AVI、MKV、WMV、FLV、WEBM、M4V</span><input id="files" type="file" accept=".mp4,.mov,.avi,.mkv,.wmv,.flv,.webm,.m4v" multiple hidden><input id="folderFiles" type="file" webkitdirectory multiple hidden><div class="tools" onclick="event.stopPropagation()"><input id="pathText" readonly placeholder="尚未选择视频"><button id="chooseFiles">选择视频</button><button id="chooseFolder">选择文件夹</button><button id="refresh">刷新</button></div></section>
  <section class="panel fields">
    <h2>命名规则 <small>拖动下方字段，命名格式会同步更新</small></h2><div class="format-board"><span class="format-label">命名格式</span><div id="formatChips" class="format-chips"></div></div>
    <div id="rulesList" class="rules-list">
    <div class="field-row" data-field="prefix"><label class="field-label" for="prefix">序列</label><input id="prefix" value="2314"><select id="prefixPreset"><option value="">常用选项</option><option>2314</option><option>2510</option><option>2412</option></select><button class="add" data-for="prefix">添加选项</button><span class="drag-handle" draggable="true" title="按住拖动排序">↕</span></div>
    <div class="field-row" data-field="product"><label class="field-label" for="product">产品名称</label><input id="product" value="拉力器"><select id="productPreset"><option value="">常用选项</option><option>美腿夹</option><option>拉力器</option><option>多功能健腹板</option><option>割草视频</option></select><button class="add" data-for="product">添加选项</button><span class="drag-handle" draggable="true" title="按住拖动排序">↕</span></div>
    <div class="field-row" data-field="dateText"><label class="field-label" for="dateText">日期</label><input id="dateText" value="6.22"><select id="dateTextPreset"><option value="">常用选项</option><option>5.27</option><option>6.22</option><option>6.23</option></select><button class="add" data-for="dateText">添加选项</button><span class="drag-handle" draggable="true" title="按住拖动排序">↕</span></div>
    <div class="field-row" data-field="person"><label class="field-label" for="person">人名/渠道/备注</label><input id="person" value="赵空军"><select id="personPreset"><option value="">常用选项</option><option>赵空车</option><option>赵空军</option></select><button class="add" data-for="person">添加选项</button><span class="drag-handle" draggable="true" title="按住拖动排序">↕</span></div>
    <div class="field-row" data-field="keyword"><label class="field-label" for="keyword">内容关键词</label><input id="keyword" value="减肥钩子"><select id="keywordPreset"><option value="">常用选项</option><option>减肥钩子</option><option>减肥钩</option></select><button class="add" data-for="keyword">添加选项</button><span class="drag-handle" draggable="true" title="按住拖动排序">↕</span></div>
    </div>
    <div class="extra"><label>起始编号<input id="startNo" value="1" type="number" min="0"></label><label>分隔符<select id="separator"><option value="-">-</option><option value="_">_</option><option value=" ">空格</option></select></label><label>文件类型<input value="仅视频格式" readonly></label></div>
  </section>
  <section class="panel table-wrap"><table><thead><tr><th>原文件名</th><th>新文件名</th><th>状态</th></tr></thead><tbody id="rows"><tr><td colspan="3" class="notice">请先选择或拖入文件</td></tr></tbody></table></section>
  <footer class="footer"><div><strong id="count">0 个文件</strong><span class="notice" id="notice">　选择文件夹后可直接重命名本地文件；单独上传文件则会下载改名副本。</span></div><div><button id="export">导出预览 CSV</button> <button id="rename" class="primary">开始重命名</button></div></footer>
</main>
<script>
  const mediaExts=new Set(['mp4','mov','avi','mkv','wmv','flv','webm','m4v']);
  let selected=[]; let previews=[]; let activeDirectory=null; let ignored=0; let fieldOrder=['prefix','product','dateText','person','keyword']; const $=id=>document.getElementById(id); const clean=v=>String(v||'').trim().replace(/[<>:"/\\|?*]/g,'-').replace(/\s+/g,'').replace(/-+/g,'-').replace(/^-|-$/g,''); const presetStorageKey='yixin-custom-presets-v1'; const orderStorageKey='yixin-field-order-v1';
  function ext(name){const i=name.lastIndexOf('.');return i<0?'':name.slice(i)}
  function base(name){const i=name.lastIndexOf('.');return i<0?name:name.slice(0,i)}
  function allowed(entry){return mediaExts.has(ext(entry.file.name).slice(1).toLowerCase())}
  function newName(index,file){const n=Number($('startNo').value)||1;const parts=[];for(let i=0;i<fieldOrder.length;i++){const id=fieldOrder[i],value=clean($(id).value);if(id==='prefix'&&fieldOrder[i+1]==='product'){const combined=value+clean($('product').value);if(combined)parts.push(combined);i++}else if(value)parts.push(value)}parts.push(n+index);return parts.join($('separator').value)+ext(file.name)}
const fieldLabels={prefix:'序列',product:'产品名称',dateText:'日期',person:'人名/渠道/备注',keyword:'内容关键词'};
  function renderFormat(){const box=$('formatChips');if(!box)return;let html='';for(let i=0;i<fieldOrder.length;i++){const id=fieldOrder[i],value=clean($(id).value)||fieldLabels[id];if(i)html+=`<span class="format-join">${fieldOrder[i-1]==='prefix'&&id==='product'?'+':'-'}</span>`;html+=`<span class="format-chip">${value}</span>`}const no=Number($('startNo').value)||1;box.innerHTML=html+'<span class="format-join">-</span><span class="format-chip end">'+no+'</span>'}
  function update(){renderFormat();const visible=selected.filter(allowed);const seen=new Set();previews=visible.map((entry,i)=>{const next=newName(i,entry.file),key=next.toLowerCase();let status='可重命名';if(seen.has(key))status='重名';else if(activeDirectory&&activeDirectory.names.has(key)&&key!==entry.file.name.toLowerCase())status='目标已存在';else if(next===entry.file.name)status='未变化';seen.add(key);return {entry,next,status}});$('count').textContent=`${previews.length} 个视频`;$('pathText').value=selected.length?(activeDirectory?`已选择文件夹：${activeDirectory.handle.name}（${selected.length} 个视频）`:`已选择 ${selected.length} 个视频`):'尚未选择视频';$('notice').textContent=activeDirectory?'　已获得本地文件夹写入权限，重命名会直接在此文件夹中完成。':'　单独上传视频会下载改名副本；选择文件夹可直接重命名本地视频。';const emptyText=ignored?'未读取非视频格式文件。仅支持 MP4、MOV、AVI、MKV、WMV、FLV、WEBM、M4V。':'请先选择或拖入视频文件';const body=$('rows');body.innerHTML=previews.length?previews.map(x=>`<tr><td title="${escapeHtml(x.entry.file.name)}">${escapeHtml(x.entry.file.name)}</td><td title="${escapeHtml(x.next)}">${escapeHtml(x.next)}</td><td class="${x.status==='重名'||x.status==='目标已存在'?'warn':'ok'}">${x.status}</td></tr>`).join(''):`<tr><td colspan="3" class="notice">${emptyText}</td></tr>`}
  function escapeHtml(v){return v.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  function showMessage(message,error=false){const notice=$('notice');notice.textContent='　'+message;notice.style.color=error?'#b63d70':'#208655'}
  function storedPresets(){try{return JSON.parse(localStorage.getItem(presetStorageKey)||'{}')}catch(ignore){return {}}}
  function addPreset(select,value){if(!value)return;const exists=Array.from(select.options).some(option=>option.value===value);if(!exists){const option=document.createElement('option');option.text=option.value=value;select.add(option)}}
  function loadStoredPresets(){const saved=storedPresets();document.querySelectorAll('select[id$="Preset"]').forEach(select=>{for(const value of (saved[select.id]||[]))addPreset(select,value)})}
  function savePreset(select,value){try{const saved=storedPresets();const list=saved[select.id]||[];if(!list.includes(value)){list.push(value);saved[select.id]=list;localStorage.setItem(presetStorageKey,JSON.stringify(saved))}}catch(ignore){showMessage('浏览器未允许保存常用选项，本次仍可使用。',true)}}
  function accept(files){activeDirectory=null;const all=Array.from(files);selected=all.filter(file=>mediaExts.has(ext(file.name).slice(1).toLowerCase())).map(file=>({file}));ignored=all.length-selected.length;update()}
  async function useWritableDirectory(handle){const entries=[];const names=new Set();let skipped=0;for await(const child of handle.values()){if(child.kind==='file'){const file=await child.getFile();names.add(file.name.toLowerCase());if(mediaExts.has(ext(file.name).slice(1).toLowerCase()))entries.push({file,handle:child});else skipped++}}activeDirectory={handle,names};selected=entries;ignored=skipped;update()}
  async function chooseWritableFolder(){if(!window.showDirectoryPicker){alert('请使用最新版 Chrome 或 Edge，才能直接重命名本地文件。');return}try{const handle=await window.showDirectoryPicker({mode:'readwrite'});await useWritableDirectory(handle)}catch(err){if(err.name!=='AbortError')alert('无法读取该文件夹：'+err.message)}}
  async function refreshFolder(){if(!activeDirectory){update();return}await useWritableDirectory(activeDirectory.handle)}
  $('files').onchange=e=>accept(e.target.files);$('folderFiles').onchange=e=>accept(e.target.files);$('chooseFiles').onclick=()=>$('files').click();$('chooseFolder').onclick=chooseWritableFolder;$('refresh').onclick=refreshFolder;$('dropZone').onclick=()=>$('files').click();
  function stopDrag(e){e.preventDefault();e.stopPropagation()}function dragOn(e){stopDrag(e);$('dropZone').classList.add('drag')}function dragOff(e){stopDrag(e);$('dropZone').classList.remove('drag')}async function receiveDrop(e){stopDrag(e);dragOff(e);const dropped=e.dataTransfer&&e.dataTransfer.files;if(dropped&&dropped.length){accept(dropped);return}const item=e.dataTransfer&&e.dataTransfer.items&&e.dataTransfer.items[0];try{if(item&&item.getAsFileSystemHandle){const handle=await item.getAsFileSystemHandle();if(handle&&handle.kind==='directory'){const permission=await handle.requestPermission({mode:'readwrite'});if(permission==='granted')await useWritableDirectory(handle)}}}catch(err){showMessage('无法读取拖入内容：'+err.message,true)}}$('dropZone').ondragenter=dragOn;$('dropZone').ondragover=dragOn;$('dropZone').ondragleave=dragOff;$('dropZone').ondrop=receiveDrop;document.addEventListener('dragover',e=>e.preventDefault());document.addEventListener('drop',e=>e.preventDefault());
  function loadFieldOrder(){try{const saved=JSON.parse(localStorage.getItem(orderStorageKey)||'[]');const expected=['prefix','product','dateText','person','keyword'];if(Array.isArray(saved)&&saved.length===expected.length&&expected.every(id=>saved.includes(id)))fieldOrder=saved}catch(ignore){}}
  function applyFieldOrder(){const list=$('rulesList');for(const id of fieldOrder){const row=list.querySelector(`.field-row[data-field="${id}"]`);if(row)list.appendChild(row)}renderFormat()}
  function saveFieldOrder(){try{localStorage.setItem(orderStorageKey,JSON.stringify(fieldOrder))}catch(ignore){}}
let draggingField=null;
  $('rulesList').addEventListener('dragstart',event=>{const row=event.target.closest('.field-row');if(!row)return;draggingField=row.dataset.field;row.classList.add('dragging');event.dataTransfer.effectAllowed='move'});
  $('rulesList').addEventListener('dragend',event=>{const row=event.target.closest('.field-row');if(row)row.classList.remove('dragging');document.querySelectorAll('.drop-before').forEach(x=>x.classList.remove('drop-before'))});
  $('rulesList').addEventListener('dragover',event=>{event.preventDefault();const row=event.target.closest('.field-row');document.querySelectorAll('.drop-before').forEach(x=>x.classList.remove('drop-before'));if(row&&row.dataset.field!==draggingField)row.classList.add('drop-before')});
  $('rulesList').addEventListener('drop',event=>{event.preventDefault();const target=event.target.closest('.field-row');if(!target||!draggingField||target.dataset.field===draggingField)return;const from=fieldOrder.indexOf(draggingField),to=fieldOrder.indexOf(target.dataset.field);fieldOrder.splice(from,1);fieldOrder.splice(to,0,draggingField);applyFieldOrder();saveFieldOrder();update()});
  document.querySelectorAll('.drag-handle').forEach(handle=>handle.setAttribute('draggable','true'));
  loadStoredPresets();loadFieldOrder();applyFieldOrder();$('rulesList').addEventListener('click',event=>{const button=event.target.closest('button[data-move]');if(!button)return;const row=button.closest('.field-row'),current=fieldOrder.indexOf(row.dataset.field),next=button.dataset.move==='up'?current-1:current+1;if(next<0||next>=fieldOrder.length)return;[fieldOrder[current],fieldOrder[next]]=[fieldOrder[next],fieldOrder[current]];applyFieldOrder();saveFieldOrder();update()});document.querySelectorAll('input,select').forEach(e=>e.addEventListener('input',update));document.querySelectorAll('select[id$="Preset"]').forEach(s=>s.addEventListener('change',()=>{if(s.value){$(s.id.replace('Preset','')).value=s.value;update()}}));document.querySelectorAll('.add').forEach(b=>b.onclick=()=>{const input=$(b.dataset.for),value=prompt('请输入要添加的常用选项：',input.value);if(value&&value.trim()){input.value=value.trim();const s=$(b.dataset.for+'Preset');addPreset(s,value.trim());savePreset(s,value.trim());update()}});
  $('export').onclick=()=>{if(!previews.length)return alert('没有可导出的预览。');const csv=['原文件名,新文件名,状态',...previews.map(x=>[x.entry.file.name,x.next,x.status].map(v=>'"'+v.replace(/"/g,'""')+'"').join(','))].join('\ufeff\n');download(new Blob([csv],{type:'text/csv;charset=utf-8'}),'rename_preview.csv')};
  async function writeCopy(directory,name,file){const target=await directory.getFileHandle(name,{create:true});const writable=await target.createWritable();await writable.write(file);await writable.close()}
  async function renameLocalFiles(){const changing=previews.filter(x=>x.status==='可重命名');if(!changing.length){showMessage('所有文件名已符合当前规则。');return}const directory=activeDirectory.handle;const stamp=Date.now();const temps=[];showMessage(`正在重命名 ${changing.length} 个视频…`);try{for(let i=0;i<changing.length;i++){const x=changing[i],temp=`.__yixin_${stamp}_${i}${ext(x.entry.file.name)}`;await writeCopy(directory,temp,x.entry.file);temps.push({temp,next:x.next,old:x.entry.file.name})}for(const x of temps)await directory.removeEntry(x.old);for(const x of temps){const file=await (await directory.getFileHandle(x.temp)).getFile();await writeCopy(directory,x.next,file);await directory.removeEntry(x.temp)}showMessage(`已直接重命名 ${changing.length} 个视频。`);await refreshFolder()}catch(err){showMessage('重命名过程中出错；未完成项目可能保留为 .__yixin_ 临时文件。',true);await refreshFolder()}}
  $('rename').onclick=async()=>{if(!previews.length){showMessage('请先上传视频文件。',true);return}if(previews.some(x=>x.status==='重名'||x.status==='目标已存在')){showMessage('预览中有重名或目标已存在，请调整后再试。',true);return}if(activeDirectory)return renameLocalFiles();showMessage(`正在下载 ${previews.length} 个改名后的副本…`);for(const x of previews){download(x.entry.file,x.next);await new Promise(r=>setTimeout(r,180))}showMessage(`已开始下载 ${previews.length} 个改名后的副本。`)};
  function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1500)}
  update();
</script>
</body>
